<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bella's Bakery Enquiry Form</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #fff7f0;
      margin: 0;
      padding: 40px;
      color: #333;
    }

    .container {
      max-width: 620px;
      margin: auto;
      background: #ffffff;
      padding: 32px;
      border-radius: 16px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.12);
    }

    h1 {
      text-align: center;
      color: #b85c38;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 28px;
    }

    label {
      display: block;
      margin-top: 18px;
      font-weight: bold;
    }

    input,
    textarea {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 15px;
      box-sizing: border-box;
    }

    textarea {
      min-height: 140px;
      resize: vertical;
    }

    button {
      width: 100%;
      margin-top: 24px;
      padding: 14px;
      background: #b85c38;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #94472b;
    }

    .note {
      margin-top: 18px;
      font-size: 13px;
      color: #777;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Bella's Bakery</h1>
    <div class="subtitle">Customer Enquiry Form</div>

    <form action="https://davetng.app.n8n.cloud/webhook-test/bc460b6c-4562-43bc-9472-2ad806e9a6ff" method="POST">
      <label for="name">Name</label>
      <input 
        type="text" 
        id="name" 
        name="Name" 
        placeholder="Enter your name" 
        required 
      />

      <label for="email">Email Address</label>
      <input 
        type="email" 
        id="email" 
        name="Email Address" 
        placeholder="Enter your email address" 
        required 
      />

      <label for="question">Question</label>
      <textarea 
        id="question" 
        name="Question" 
        placeholder="Ask us about opening hours, cakes, delivery, payment, custom orders, or allergies..." 
        required
      ></textarea>

      <button type="submit">Submit Enquiry</button>
    </form>

    <div class="note">
      Thank you for contacting Bella's Bakery. We will reply to your enquiry by email.
    </div>
  </div>
</body>
</html>
