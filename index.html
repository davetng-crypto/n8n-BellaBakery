<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bella's Bakery</title>
<style>
body {
    font-family: Arial, Helvetica, sans-serif;
    background:#fff7f0;
    margin:0;
    padding:40px;
}
.container {
    max-width:650px;
    margin:auto;
    background:#fff;
    padding:35px;
    border-radius:16px;
    box-shadow:0 8px 20px rgba(0,0,0,.15);
}
h1{text-align:center;color:#b85c38;}
.subtitle{text-align:center;color:#666;margin-bottom:25px;}
label{display:block;margin-top:18px;font-weight:bold;}
input,textarea{
    width:100%;
    padding:12px;
    margin-top:6px;
    border:1px solid #ccc;
    border-radius:8px;
    box-sizing:border-box;
    font-size:15px;
}
textarea{height:140px;resize:vertical;}
button{
    width:100%;
    margin-top:24px;
    padding:14px;
    background:#b85c38;
    color:#fff;
    border:none;
    border-radius:8px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}
button:hover{background:#964727;}
#success {
    display:none;
    margin-top:20px;
    padding:20px;
    background:#e8f8ec;
    border:1px solid #a5d6a7;
    border-radius:10px;
    text-align:center;
}
</style>
</head>
<body>

<div class="container">

<h1>🍰 Bella's Bakery</h1>
<p class="subtitle">Customer Enquiry Form</p>

<form id="enquiryForm">

<label>Name</label>
<input type="text" name="Name" required>

<label>Email Address</label>
<input type="email" name="Email Address" required>

<label>Your Question</label>
<textarea name="Question" placeholder="Ask us anything..." required></textarea>

<button type="submit">Submit Enquiry</button>

</form>

<div id="success">
<h2>🎉 Thank You!</h2>
<p>Your enquiry has been received successfully.</p>
<p>Our AI assistant is preparing your response.</p>
<p><strong>Please check your email shortly.</strong></p>
</div>

</div>

<script>
document.getElementById("enquiryForm").addEventListener("submit", async function(e){
    e.preventDefault();

    const form=this;
    const data=new FormData(form);

    try {
        await fetch("https://davetng.app.n8n.cloud/webhook/bc460b6c-4562-43bc-9472-2ad806e9a6ff", {
            method:"POST",
            body:data
        });

        form.style.display="none";
        document.getElementById("success").style.display="block";
    }
    catch(err){
        alert("Unable to submit your enquiry. Please try again.");
        console.error(err);
    }
});
</script>

</body>
</html>
