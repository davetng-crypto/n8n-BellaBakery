<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bella's Bakery Customer Enquiry</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #fff7f0;
      margin: 0;
      padding: 40px;
      color: #333;
    }

    .container {
      max-width: 600px;
      margin: auto;
      background: #ffffff;
      padding: 30px;
      border-radius: 14px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.12);
    }

    h1 {
      color: #b85c38;
      text-align: center;
      margin-bottom: 10px;
    }

    p {
      text-align: center;
      color: #666;
    }

    label {
      display: block;
      margin-top: 18px;
      font-weight: bold;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 15px;
      box-sizing: border-box;
    }

    textarea {
      min-height: 130px;
      resize: vertical;
    }

    button {
      width: 100%;
      margin-top: 24px;
      padding: 14px;
      background: #b85c38;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #94472b;
    }

    .note {
      margin-top: 18px;
      font-size: 13px;
      color: #777;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Bella's Bakery</h1>
    <p>Customer Enquiry Form</p>

    <form action="https://davetng.app.n8n.cloud/form-test/bcdaa8aa-6a12-4a23-a9df-428bd534d946" method="POST">
      <label for="name">Name</label>
      <input type="text" id="name" name="Name" placeholder="Enter your name" required />

      <label for="email">Email Address</label>
      <input type="email" id="email" name="Email Address" placeholder="Enter your email address" required />

      <label for="question">Question</label>
      <textarea id="question" name="Question" placeholder="Ask us about cakes, opening hours, delivery, payment, or custom orders..." required></textarea>

      <button type="submit">Submit Enquiry</button>
    </form>

    <div class="note">
      We will reply to your enquiry by email as soon as possible.
    </div>
  </div>
</body>
</html>
