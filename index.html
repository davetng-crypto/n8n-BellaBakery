<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bella's Bakery - Customer Enquiry</title>
<style>
body{font-family:Arial,sans-serif;background:#fff7f0;margin:0;padding:40px;color:#333}
.container{max-width:650px;margin:auto;background:#fff;padding:30px;border-radius:12px;box-shadow:0 4px 12px rgba(0,0,0,.15)}
h1{text-align:center;color:#b85c38}
p.subtitle{text-align:center;color:#666;margin-bottom:25px}
label{display:block;font-weight:bold;margin-top:18px}
input,textarea{width:100%;padding:12px;margin-top:6px;border:1px solid #ccc;border-radius:8px;box-sizing:border-box;font-size:15px}
textarea{height:140px;resize:vertical}
button{width:100%;margin-top:24px;padding:14px;background:#b85c38;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:bold;cursor:pointer}
button:hover{background:#964727}
.note{text-align:center;color:#777;font-size:13px;margin-top:18px}
</style>
</head>
<body>
<div class="container">
<h1>🍰 Bella's Bakery</h1>
<p class="subtitle">Customer Enquiry Form</p>

<form action="https://davetng.app.n8n.cloud/webhook/bc460b6c-4562-43bc-9472-2ad806e9a6ff" method="POST">

<label>Name</label>
<input type="text" name="Name" placeholder="Enter your name" required>

<label>Email Address</label>
<input type="email" name="Email Address" placeholder="Enter your email address" required>

<label>Your Question</label>
<textarea name="Question" placeholder="Ask us about opening hours, cakes, delivery, payment, custom orders, allergies or anything else..." required></textarea>

<button type="submit">Submit Enquiry</button>

</form>

<p class="note">
Thank you for contacting Bella's Bakery.<br>
Our team will reply to your enquiry via email shortly.
</p>
</div>
</body>
</html>
